<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ujian Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-800">

    <div id="app" class="min-h-screen flex flex-col">

        <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold">Portal Ujian</h1>
            <div id="user-info" class="hidden">
                <span id="display-name" class="mr-4 font-semibold"></span>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center p-4">
            
            <div id="login-view" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
                <div class="flex border-b mb-6">
                    <button id="btn-tab-mhs" onclick="switchLoginTab('mhs')" class="w-1/2 py-2 border-b-2 border-blue-600 font-bold text-blue-600">Mahasiswa</button>
                    <button id="btn-tab-dsn" onclick="switchLoginTab('dsn')" class="w-1/2 py-2 text-gray-500 font-semibold hover:text-blue-500">Dosen</button>
                </div>

                <form id="form-mhs" onsubmit="handleLoginMhs(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">NIM</label>
                        <input type="text" id="mhs-nim" required class="w-full border rounded p-2 focus:outline-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Nama Lengkap (Sesuai Absen)</label>
                        <input type="text" id="mhs-nama" required class="w-full border rounded p-2 focus:outline-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Password</label>
                        <input type="password" id="mhs-pass" required class="w-full border rounded p-2 focus:outline-blue-500">
                    </div>
                    <div class="mb-6 flex items-center">
                        <input type="checkbox" id="mhs-new" class="mr-2">
                        <label for="mhs-new" class="text-sm">Ini login pertama (Buat password baru)</label>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Masuk / Daftar</button>
                </form>

                <form id="form-dsn" class="hidden" onsubmit="handleLoginDsn(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Username Dosen</label>
                        <input type="text" id="dsn-user" required class="w-full border rounded p-2 focus:outline-blue-500">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-1">Password</label>
                        <input type="password" id="dsn-pass" required class="w-full border rounded p-2 focus:outline-blue-500">
                    </div>
                    <button type="submit" class="w-full bg-gray-800 text-white font-bold py-2 rounded hover:bg-gray-900">Masuk sebagai Dosen</button>
                </form>
            </div>

            <div id="mhs-dashboard-view" class="hidden bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl">
                <h2 class="text-2xl font-bold mb-6 border-b pb-2">Daftar Ujian Tersedia</h2>
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-1">Masukkan ID Set Soal (Dari Dosen)</label>
                    <input type="text" id="input-id-set" class="w-full border rounded p-2 focus:outline-blue-500 mb-2">
                    <button onclick="mulaiUjian()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 font-bold">Mulai Ujian</button>
                </div>
            </div>

            <div id="exam-view" class="hidden w-full max-w-4xl flex flex-col md:flex-row gap-4">
                <div class="w-full md:w-1/4 bg-white p-4 rounded-lg shadow h-max">
                    <div class="text-center mb-4">
                        <p class="text-sm text-gray-500">Sisa Waktu</p>
                        <p id="timer-display" class="text-2xl font-bold text-red-600">00:00:00</p>
                    </div>
                    <div id="soal-nav" class="grid grid-cols-4 gap-2 mb-4">
                        </div>
                    <button onclick="selesaiUjian()" class="w-full bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700">Selesaikan Ujian</button>
                    <p id="save-status" class="text-xs text-center text-gray-400 mt-2">Tersimpan di perangkat lokal</p>
                </div>

                <div class="w-full md:w-3/4 bg-white p-6 rounded-lg shadow">
                    <div id="soal-container">
                        </div>
                    <div class="flex justify-between mt-6 border-t pt-4">
                        <button onclick="prevSoal()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Sebelumnya</button>
                        <button onclick="nextSoal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Selanjutnya</button>
                    </div>
                </div>
            </div>

            <div id="dsn-dashboard-view" class="hidden w-full max-w-6xl bg-white p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-6 border-b pb-2">
                    <h2 class="text-2xl font-bold">Monitoring Real-Time</h2>
                    <button onclick="loadDashboardDosen()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">Refresh Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 border-b">
                                <th class="p-2">Waktu Terakhir</th>
                                <th class="p-2">NIM</th>
                                <th class="p-2">Nama</th>
                                <th class="p-2">Kelas</th>
                                <th class="p-2">ID Set</th>
                                <th class="p-2">Status</th>
                                <th class="p-2">Pelanggaran</th>
                            </tr>
                        </thead>
                        <tbody id="table-body-dosen" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
        const API_URL = 'URL_GAS_ANDA_DISINI'; 

        // State Management
        let currentUser = null;
        let currentRole = null;
        let bankSoal = [];
        let jawabanMahasiswa = {};
        let currentSoalIndex = 0;
        let timerInterval = null;
        let currentIdSet = '';
        let waktuSisa = 0;
        let pollingInterval = null;

        // --- FUNGSI UI / NAVIGASI VIEW ---
        function showView(viewId) {
            ['login-view', 'mhs-dashboard-view', 'exam-view', 'dsn-dashboard-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        function switchLoginTab(role) {
            const btnMhs = document.getElementById('btn-tab-mhs');
            const btnDsn = document.getElementById('btn-tab-dsn');
            const formMhs = document.getElementById('form-mhs');
            const formDsn = document.getElementById('form-dsn');

            if (role === 'mhs') {
                btnMhs.className = "w-1/2 py-2 border-b-2 border-blue-600 font-bold text-blue-600";
                btnDsn.className = "w-1/2 py-2 text-gray-500 font-semibold hover:text-blue-500";
                formMhs.classList.remove('hidden');
                formDsn.classList.add('hidden');
            } else {
                btnDsn.className = "w-1/2 py-2 border-b-2 border-blue-600 font-bold text-blue-600";
                btnMhs.className = "w-1/2 py-2 text-gray-500 font-semibold hover:text-blue-500";
                formDsn.classList.remove('hidden');
                formMhs.classList.add('hidden');
            }
        }

        function setHeaderUser(name) {
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('display-name').innerText = name;
        }

        function logout() {
            currentUser = null;
            currentRole = null;
            clearInterval(timerInterval);
            clearInterval(pollingInterval);
            document.getElementById('user-info').classList.add('hidden');
            showView('login-view');
        }

        // --- FUNGSI API CALLS ---
        async function fetchAPI(data) {
            try {
                Swal.showLoading();
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                Swal.close();
                return result;
            } catch (error) {
                Swal.fire('Error', 'Gagal terhubung ke server', 'error');
                return null;
            }
        }

        // --- LOGIN & REGISTRASI ---
        async function handleLoginMhs(e) {
            e.preventDefault();
            const data = {
                action: 'login_mahasiswa',
                nim: document.getElementById('mhs-nim').value,
                nama: document.getElementById('mhs-nama').value,
                password: document.getElementById('mhs-pass').value,
                isNewRegister: document.getElementById('mhs-new').checked
            };

            const res = await fetchAPI(data);
            if (res && res.status === 'success') {
                currentUser = res.data;
                currentRole = 'mahasiswa';
                setHeaderUser(currentUser.nama);
                showView('mhs-dashboard-view');
                Swal.fire('Sukses', res.message, 'success');
            } else if (res) {
                Swal.fire('Gagal', res.message, 'error');
            }
        }

        async function handleLoginDsn(e) {
            e.preventDefault();
            const data = {
                action: 'login_dosen',
                username: document.getElementById('dsn-user').value,
                password: document.getElementById('dsn-pass').value
            };

            const res = await fetchAPI(data);
            if (res && res.status === 'success') {
                currentRole = 'dosen';
                setHeaderUser('Dosen');
                showView('dsn-dashboard-view');
                loadDashboardDosen();
                // Polling data tiap 10 detik
                pollingInterval = setInterval(loadDashboardDosen, 10000); 
            } else if (res) {
                Swal.fire('Gagal', res.message, 'error');
            }
        }

        // --- LOGIKA UJIAN ---
        async function mulaiUjian() {
            currentIdSet = document.getElementById('input-id-set').value;
            if (!currentIdSet) return Swal.fire('Error', 'Masukkan ID Set Soal', 'warning');

            const res = await fetchAPI({ action: 'get_soal', id_set: currentIdSet });
            if (res && res.status === 'success') {
                bankSoal = res.data;
                
                // Cek local storage untuk autosave sebelumnya
                const savedData = localStorage.getItem(`ujian_${currentUser.nim}_${currentIdSet}`);
                if (savedData) {
                    jawabanMahasiswa = JSON.parse(savedData);
                } else {
                    jawabanMahasiswa = {};
                }

                currentSoalIndex = 0;
                // Set default waktu (bisa dinamis dari server nantinya, ini fix 60 mnt sbg contoh)
                waktuSisa = 60 * 60; 
                startTimer();
                renderNavSoal();
                renderSoal();
                showView('exam-view');
                initCheatDetection();
            } else if (res) {
                Swal.fire('Gagal', res.message, 'error');
            }
        }

        function renderNavSoal() {
            const nav = document.getElementById('soal-nav');
            nav.innerHTML = '';
            bankSoal.forEach((_, index) => {
                const btn = document.createElement('button');
                btn.innerText = index + 1;
                btn.className = `p-2 rounded font-bold border ${jawabanMahasiswa[index] ? 'bg-green-500 text-white border-green-600' : 'bg-gray-100 text-gray-700 border-gray-300'}`;
                btn.onclick = () => { currentSoalIndex = index; renderSoal(); };
                nav.appendChild(btn);
            });
        }

        function renderSoal() {
            const container = document.getElementById('soal-container');
            const soal = bankSoal[currentSoalIndex];
            
            let html = `<h3 class="text-lg font-bold mb-4">Soal No. ${currentSoalIndex + 1}</h3>`;
            html += `<p class="mb-4">${soal.pertanyaan}</p>`;
            
            if (soal.gambar) {
                html += `<img src="${soal.gambar}" class="max-w-full h-auto mb-4 rounded border">`;
            }

            if (soal.tipe.toLowerCase() === 'pg') {
                ['A', 'B', 'C', 'D'].forEach(opsi => {
                    if(soal.opsi[opsi]) {
                        const isChecked = jawabanMahasiswa[currentSoalIndex] === opsi ? 'checked' : '';
                        html += `
                        <label class="block mb-2 p-3 border rounded cursor-pointer hover:bg-gray-50 ${isChecked ? 'bg-blue-50 border-blue-500' : ''}">
                            <input type="radio" name="opsi" value="${opsi}" onchange="simpanJawaban('${opsi}')" class="mr-2" ${isChecked}>
                            ${opsi}. ${soal.opsi[opsi]}
                        </label>`;
                    }
                });
            } else {
                const nilaiEsai = jawabanMahasiswa[currentSoalIndex] || '';
                html += `<textarea oninput="simpanJawaban(this.value)" rows="5" class="w-full border rounded p-2 focus:outline-blue-500" placeholder="Ketik jawaban di sini...">${nilaiEsai}</textarea>`;
            }

            container.innerHTML = html;
        }

        function simpanJawaban(nilai) {
            jawabanMahasiswa[currentSoalIndex] = nilai;
            // Autosave ke Local Storage (Eksekusi 0 latency)
            localStorage.setItem(`ujian_${currentUser.nim}_${currentIdSet}`, JSON.stringify(jawabanMahasiswa));
            
            document.getElementById('save-status').innerText = `Autosave lokal: ${new Date().toLocaleTimeString()}`;
            renderNavSoal(); // Update warna tombol navigasi
        }

        function nextSoal() {
            if (currentSoalIndex < bankSoal.length - 1) {
                currentSoalIndex++;
                renderSoal();
            }
        }

        function prevSoal() {
            if (currentSoalIndex > 0) {
                currentSoalIndex--;
                renderSoal();
            }
        }

        // --- SISTEM WAKTU & SUBMIT ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if (waktuSisa <= 0) {
                    clearInterval(timerInterval);
                    selesaiUjian(true); // Force submit
                    return;
                }
                waktuSisa--;
                const h = Math.floor(waktuSisa / 3600).toString().padStart(2, '0');
                const m = Math.floor((waktuSisa % 3600) / 60).toString().padStart(2, '0');
                const s = (waktuSisa % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
                
                // Sync data ke backend tiap 30 detik agar jika browser crash, dosen bisa lihat progres
                if (waktuSisa % 30 === 0) {
                    kirimDataUjian(false);
                }
            }, 1000);
        }

        async function selesaiUjian(isForce = false) {
            const confirmMsg = isForce ? 'Waktu habis! Jawaban disubmit otomatis.' : 'Yakin ingin menyelesaikan ujian? Data tidak bisa diubah lagi.';
            
            if (!isForce) {
                const result = await Swal.fire({
                    title: 'Konfirmasi', text: confirmMsg, icon: 'warning',
                    showCancelButton: true, confirmButtonText: 'Ya, Selesai'
                });
                if (!result.isConfirmed) return;
            } else {
                Swal.fire('Info', confirmMsg, 'info');
            }

            clearInterval(timerInterval);
            await kirimDataUjian(true);
            
            // Hapus session local setelah selesai
            localStorage.removeItem(`ujian_${currentUser.nim}_${currentIdSet}`);
            showView('mhs-dashboard-view');
        }

        function kirimDataUjian(isFinal) {
            const durasiPengerjaan = 3600 - waktuSisa; // Asumsi total 3600 dt
            return fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'save_jawaban',
                    nim: currentUser.nim,
                    nama: currentUser.nama,
                    kelas: currentUser.kelas,
                    id_set: currentIdSet,
                    durasi: durasiPengerjaan,
                    nilai: 0, // Dihitung di backend atau dosen manual
                    jawaban_detail: jawabanMahasiswa,
                    is_final: isFinal
                })
            });
        }

        // --- SISTEM ANTI KECURANGAN ---
        function initCheatDetection() {
            // Deteksi Pindah Tab / Layar Mati
            document.addEventListener("visibilitychange", () => {
                if (document.hidden && currentRole === 'mahasiswa' && !document.getElementById('exam-view').classList.contains('hidden')) {
                    kirimLogPelanggaran('Pindah Tab/Aplikasi', 'Kehilangan fokus dari layar ujian');
                }
            });

            // Deteksi Copy Paste (Paste teks Anthropic dll)
            document.addEventListener('paste', (e) => {
                if (currentRole === 'mahasiswa' && !document.getElementById('exam-view').classList.contains('hidden')) {
                    const pasteData = (e.clipboardData || window.clipboardData).getData('text');
                    kirimLogPelanggaran('Indikasi Copy-Paste', `Menempel teks: ${pasteData.substring(0, 50)}...`);
                }
            });
        }

        function kirimLogPelanggaran(jenis, detail) {
            // Menggunakan beacon atau fetch fire-and-forget agar tidak mengganggu ujian
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'log_pelanggaran',
                    nim: currentUser.nim,
                    id_set: currentIdSet,
                    jenis_pelanggaran: jenis,
                    detail: detail
                })
            }).catch(e => console.error(e));
        }

        // --- DASHBOARD DOSEN ---
        async function loadDashboardDosen() {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'get_dashboard' })
            });
            const res = await response.json();
            
            if (res && res.status === 'success') {
                const tbody = document.getElementById('table-body-dosen');
                tbody.innerHTML = '';
                res.data.forEach(row => {
                    const rowHtml = `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-2">${row.timestamp}</td>
                            <td class="p-2 font-bold">${row.nim}</td>
                            <td class="p-2">${row.nama}</td>
                            <td class="p-2">${row.kelas}</td>
                            <td class="p-2 text-center">${row.id_set}</td>
                            <td class="p-2">
                                <span class="px-2 py-1 rounded text-xs text-white ${row.status === 'Selesai' ? 'bg-green-500' : 'bg-yellow-500'}">${row.status}</span>
                            </td>
                            <td class="p-2 text-red-600 text-xs whitespace-pre-wrap">${row.pelanggaran || '-'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += rowHtml;
                });
            }
        }
    </script>
</body>
</html>
